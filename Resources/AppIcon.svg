<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#FF5FA2"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD36E"/>
      <stop offset="1" stop-color="#FF6B6B"/>
    </linearGradient>
  </defs>
  <!-- app squircle (inset for the macOS icon grid) -->
  <rect x="104" y="104" width="816" height="816" rx="184" fill="url(#bg)"/>
  <!-- dynamic-island pill -->
  <rect x="252" y="417" width="520" height="190" rx="95" fill="#0B0B0F"/>
  <!-- mini cover art -->
  <rect x="296" y="457" width="110" height="110" rx="24" fill="url(#cover)"/>
  <!-- equalizer bars (centered on the pill) -->
  <g fill="#FFFFFF">
    <rect x="560" y="482" width="26" height="60" rx="13"/>
    <rect x="606" y="447" width="26" height="130" rx="13"/>
    <rect x="652" y="470" width="26" height="84" rx="13"/>
    <rect x="698" y="437" width="26" height="150" rx="13"/>
  </g>
</svg>
